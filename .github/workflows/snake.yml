name: Generate Snake

on:
  # Executar automaticamente a cada 12 horas
  schedule:
    - cron: "0 */12 * * *"

  # Permitir execução manual
  workflow_dispatch:

  # Executar sempre que houver alterações na branch principal
  push:
    branches:
      - main
      - master

jobs:
  generate:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Gerar a animação com base nas contribuições
      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: DGomes-17
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publicar os ficheiros SVG na branch output
      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
